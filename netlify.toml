[build]
  command = "npm run build"
  publish = "dist"

[functions]
  external_node_modules = ["serverless-http", "express", "mongoose", "cors", "body-parser"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
